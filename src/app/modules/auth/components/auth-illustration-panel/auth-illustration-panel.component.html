<div class="auth-illustration-panel">
  <div class="auth-illustration-blob" aria-hidden="true">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="blobG" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" class="blob-stop-1"/>
          <stop offset="1" class="blob-stop-2"/>
        </linearGradient>
        <linearGradient id="authLogoTrunk" x1="20" y1="22" x2="20" y2="36" gradientUnits="userSpaceOnUse">
          <stop stop-color="#d1a33e"/>
          <stop offset="1" stop-color="#8a6a20"/>
        </linearGradient>
        <linearGradient id="authLogoLeaf" x1="9" y1="8" x2="30" y2="22" gradientUnits="userSpaceOnUse">
          <stop stop-color="#ffd875"/>
          <stop offset="1" stop-color="#d1a33e"/>
        </linearGradient>
      </defs>
      <path d="M200,40 C280,30 360,90 370,180 C380,270 320,340 230,360 C140,380 50,340 30,250 C10,160 60,60 150,45 C166,42 183,43 200,40Z" fill="url(#blobG)" opacity="0.6"/>

      <!-- the Talentree logo mark, scaled up to fill the panel -->
      <g class="auth-logo-mark" transform="translate(40,40) scale(8)">
        <path d="M20 36V22" stroke="url(#authLogoTrunk)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M20 22C20 22 10 20 9 12C9 12 16 10 20 17C20 17 22 8 30 8C30 8 31 17 20 22Z" fill="url(#authLogoLeaf)"/>
        <circle cx="20" cy="10" r="3" fill="#ffd875"/>
      </g>
    </svg>
  </div>

  <div class="auth-illustration-copy">
    <div class="auth-wordmark">
      <svg viewBox="0 0 40 40" width="26" height="26" aria-hidden="true">
        <path d="M20,36 V22" stroke="#d1a33e" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M20,22 C20,22 10,20 9,12 C9,12 16,10 20,17 C20,17 22,8 30,8 C30,8 31,17 20,22Z" fill="#ffd875"/>
      </svg>
      <span>Talentree</span>
    </div>
    <h3>{{ heading }}</h3>
    <p>{{ subtext }}</p>
  </div>
</div>
