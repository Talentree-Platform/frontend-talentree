<div class="forced-password-card">
  <h2 class="form-title">Set a New Password</h2>
  <p class="form-subtitle">
    This is a temporary password. Please set a new one to continue.
  </p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="password-form">

    <div class="form-field">
      <label for="temporaryPassword">Temporary Password</label>
      <input
        id="temporaryPassword"
        type="password"
        formControlName="temporaryPassword"
        placeholder="Enter your temporary password"
        [class.invalid]="form.get('temporaryPassword')?.invalid && form.get('temporaryPassword')?.touched"
      />
      <span class="error-msg" *ngIf="form.get('temporaryPassword')?.invalid && form.get('temporaryPassword')?.touched">
        Temporary password is required.
      </span>
    </div>

    <div class="form-field">
      <label for="newPassword">New Password</label>
      <input
        id="newPassword"
        type="password"
        formControlName="newPassword"
        placeholder="At least 8 characters"
        [class.invalid]="form.get('newPassword')?.invalid && form.get('newPassword')?.touched"
      />
      <span class="error-msg" *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">
        Password must be at least 8 characters.
      </span>
    </div>

    <div class="form-field">
      <label for="confirmNewPassword">Confirm New Password</label>
      <input
        id="confirmNewPassword"
        type="password"
        formControlName="confirmNewPassword"
        placeholder="Re-enter new password"
        [class.invalid]="form.errors?.['passwordsMismatch'] && form.get('confirmNewPassword')?.touched"
      />
      <span class="error-msg" *ngIf="form.errors?.['passwordsMismatch'] && form.get('confirmNewPassword')?.touched">
        Passwords do not match.
      </span>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Updating...' : 'Update Password' }}
      </button>
    </div>

  </form>
</div>
