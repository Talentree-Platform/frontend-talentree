<nav class="navbar navbar-expand-lg admin-nav">
  <div class="container-fluid">

    <!-- Logo -->
    <a class="navbar-brand brand-link" routerLink="/admin/dashboard">
      <img src="assets/images/logo.jpg" alt="Talentree" class="nav-logo">
      <span class="brand-pill">ADMIN</span>
    </a>

    <!-- Mobile Toggle -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav"
      aria-controls="adminNav" aria-expanded="false">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="adminNav">



      <!-- Right Icons -->
      <div class="nav-icons d-flex align-items-center gap-2 ms-lg-2">

        <!-- Notifications -->
        <button class="icon-btn" routerLink="/admin/notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="badge" *ngIf="notifCount > 0">{{ notifCount }}</span>
        </button>

        <div class="divider"></div>

        <!-- Admin Avatar with Dropdown -->
        <div class="admin-info" (click)="toggleDropdown()" [class.active]="dropdownOpen">
          <div class="avatar">
            <img src="assets/images/olive.jpg" alt="Admin"
              onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <span class="avatar-fallback">A</span>
          </div>
          <div class="admin-meta">
            <span class="admin-name">{{ currentUserName }}</span>
            <span class="admin-role">{{ currentUserRoleLabel }}</span>
          </div>
          <svg class="chevron" [class.rotated]="dropdownOpen" width="11" height="11" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9" />
          </svg>

          <!-- Dropdown Menu -->
          <div class="profile-dropdown" *ngIf="dropdownOpen" (click)="$event.stopPropagation()">
            <div class="dropdown-header">
              <div class="avatar sm">
                <img src="assets/images/olive.jpg" alt="Admin"
                  onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <span class="avatar-fallback">A</span>
              </div>
              <div>
                <p class="dropdown-name">{{ currentUserName }}</p>
                <p class="dropdown-role">{{ currentUserRoleLabel }}</p>
              </div>
            </div>

            <div class="dropdown-divider"></div>

            <a class="dropdown-item" (click)="navigateTo('/admin/account')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              </svg>
              Account Settings
            </a>

            <a class="dropdown-item" routerLink="/admin/profile" (click)="dropdownOpen = false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              My Profile
            </a>

            <div class="dropdown-divider"></div>

            <button class="dropdown-item danger" (click)="logout()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
              </svg>
              Logout
            </button>
          </div>
        </div>

      </div>

      <!-- Mobile Tabs only -->
      <div class="d-lg-none mt-2 mobile-tabs">
        <a class="nav-tab" routerLink="/admin/dashboard" routerLinkActive="active">Dashboard</a>
        <a class="nav-tab" routerLink="/admin/pendingbo" routerLinkActive="active">Owners</a>
        <a class="nav-tab" routerLink="/admin/producthome" routerLinkActive="active">Products</a>
        <a class="nav-tab" routerLink="/admin/production-requests" routerLinkActive="active">Orders</a>
        <a class="nav-tab" routerLink="/admin/suppliers" routerLinkActive="active">Suppliers</a>
        <a class="nav-tab" routerLink="/admin/rawmaterials" routerLinkActive="active">Raw Materials</a>
        <a *ngIf="isSuperAdmin" class="nav-tab" routerLink="/admin/adminlist" routerLinkActive="active">Admins</a>
        <a class="nav-tab" routerLink="/account" routerLinkActive="active">Account</a>
      </div>

    </div>
  </div>
  <!-- Overlay to close dropdown -->
  <div class="dropdown-overlay" *ngIf="dropdownOpen" (click)="dropdownOpen = false"></div>
</nav>
