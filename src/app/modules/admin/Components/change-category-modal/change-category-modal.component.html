<div class="owner-products-modal-backdrop" (click)="onBackdropClick()" role="presentation"></div>
<div
  class="owner-products-modal admin-change-category-modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="change-category-title"
  (click)="$event.stopPropagation()"
>
  <h2 id="change-category-title" class="owner-products-modal-title">Change Category</h2>

  <p class="owner-products-modal-text">
    <strong>{{ productName }}</strong>
  </p>

  @if (productId == null) {
    <p class="admin-change-category-modal__error">This product has no valid id.</p>
  }

  <form [formGroup]="form" (ngSubmit)="confirm()" novalidate>
    <div class="admin-change-category-modal__field">
      <label class="admin-change-category-modal__label" for="change-category-select">New category</label>
      <select
        id="change-category-select"
        class="select-main admin-change-category-modal__select"
        formControlName="newCategoryId"
      >
        <option [ngValue]="null" disabled>Choose a category…</option>
        @for (cat of categories; track cat.id) {
          <option [ngValue]="cat.id">{{ cat.name }}</option>
        }
      </select>
      @if (categories.length === 0) {
        <span class="admin-change-category-modal__hint">No categories loaded yet.</span>
      }
      @if (form.controls.newCategoryId.invalid && form.controls.newCategoryId.touched) {
        <span class="admin-change-category-modal__error">Please choose a category.</span>
      }
    </div>

    <div class="owner-products-modal-actions">
      <button type="button" class="btn-main btn-secondary" [disabled]="submitting" (click)="dismiss()">
        Cancel
      </button>
      <button
        type="submit"
        class="btn-main btn-analytics admin-change-category-modal__confirm"
        [disabled]="submitting || productId == null || categories.length === 0"
      >
        @if (submitting) {
          <span class="admin-change-category-modal__spinner" aria-hidden="true"></span>
        }
        Save
      </button>
    </div>
  </form>
</div>
