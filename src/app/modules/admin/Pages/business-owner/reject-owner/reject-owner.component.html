@if (isOpen) {
  <div class="modal-overlay">
    <div class="modal-container">

      <!-- Header -->
      <div class="modal-header">
        <div class="modal-title-group">
          <span class="modal-subtitle">Action Required</span>
          <h2 class="modal-title">Reject Business Owner</h2>
        </div>
        <button class="close-btn" type="button" (click)="onClose()" aria-label="Close modal">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Reason textarea -->
      <div class="add-note">
        <label for="rejection-reason">Rejection Reason <span style="color: var(--red); font-weight:400;">*</span></label>
        <textarea
          id="rejection-reason"
          class="textarea-main"
          rows="4"
          [(ngModel)]="rejectionReason"
          [disabled]="isRejectRequestPending"
          placeholder="Provide a clear reason (at least 10 characters)…">
        </textarea>
      </div>

      <!-- Actions -->
      <div class="modal-actions">
        <button class="btn-modal btn-cancel" type="button"
          (click)="onClose()" [disabled]="isRejectRequestPending">
          Cancel
        </button>
        <button class="btn-modal btn-reject" type="button"
          (click)="onReject()"
          [disabled]="!isReasonValid() || isRejected() || isRejectRequestPending">
          @if (isRejectRequestPending) { Rejecting… } @else { Reject }
        </button>
      </div>

    </div>
  </div>
}
