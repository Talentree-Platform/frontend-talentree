@if (isOpen) {
  <div class="modal-overlay">
    <div class="modal-container">

      <!-- Header -->
      <div class="modal-header">
        <div class="modal-title-group">
          <span class="modal-subtitle">Action Required</span>
          <h2 class="modal-title">Approve Business Owner</h2>
        </div>
        <button class="close-btn" type="button" (click)="onClose()" aria-label="Close modal">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Note textarea -->
      <div class="add-note">
        <label for="note">Add a note <span style="color: var(--text-soft); font-weight:400;">(optional)</span></label>
        <textarea
          id="note"
          class="textarea-main"
          rows="4"
          [(ngModel)]="noteText"
          [disabled]="isApproveRequestPending"
          placeholder="Leave an internal note about this approval…">
        </textarea>
      </div>

      <!-- Actions -->
      <div class="modal-actions">
        <button class="btn-modal btn-cancel" type="button"
          (click)="onClose()" [disabled]="isApproveRequestPending">
          Cancel
        </button>
        <button class="btn-modal btn-approve" type="button"
          (click)="onApprove()"
          [disabled]="isApproved() || isApproveRequestPending">
          @if (isApproveRequestPending) { Approving… } @else { Approve }
        </button>
      </div>

    </div>
  </div>
}
