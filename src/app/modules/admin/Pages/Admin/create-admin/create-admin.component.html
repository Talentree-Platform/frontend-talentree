<!-- Overlay -->
<div class="modal-overlay" (click)="onClose()"></div>

<!-- Modal -->
<div class="modal-box">

  <!-- Header -->
  <div class="modal-header">
    <div class="modal-header-left">
      <div class="modal-header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C88010" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/>
          <line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
        </svg>
      </div>
      <div>
        <h3>Create New Admin</h3>
        <p class="modal-header-sub">Fill in the details below</p>
      </div>
    </div>
    <button class="btn-close-modal" (click)="onClose()">✕</button>
  </div>

  <!-- Body -->
  <div class="modal-body">

    <div *ngIf="error" class="error-msg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>

    <!-- Full Name -->
    <div class="form-group">
      <label>Full Name <span class="required">*</span></label>
      <input type="text" [(ngModel)]="form.fullName" placeholder="John Doe" />
    </div>

    <!-- Email & Phone in a row -->
    <div class="form-row">
      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" [(ngModel)]="form.email" placeholder="admin@example.com" />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" [(ngModel)]="form.phoneNumber" placeholder="010xxxxxxxx" />
      </div>
    </div>

    <!-- Password & Confirm in a row -->
    <div class="form-row">
      <div class="form-group">
        <label>Password <span class="required">*</span></label>
        <input type="password" [(ngModel)]="form.password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Confirm Password <span class="required">*</span></label>
        <input type="password" [(ngModel)]="form.confirmPassword" placeholder="••••••••" />
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="modal-footer">
    <button class="btn-cancel" (click)="onClose()">Cancel</button>
    <button
      class="btn-confirm"
      (click)="submit()"
      [disabled]="loading || !form.fullName || !form.email || !form.password"
    >
      <span *ngIf="loading" class="spinner"></span>
      {{ loading ? 'Creating...' : 'Create Admin' }}
    </button>
  </div>

</div>
