<div class="cart-error">
      <div class="cart-error__icon">
        <svg viewBox="0 0 60 60" fill="none">
          <circle cx="30" cy="30" r="28" stroke="#E8D5A3" stroke-width="1.5"/>
          <circle cx="30" cy="30" r="20" stroke="rgba(217,64,64,0.2)" stroke-width="1.5"/>
          <path d="M22 22l16 16M38 22L22 38" stroke="#D94040" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h3 class="cart-error__title">Couldn't load your cart</h3>
      <p class="cart-error__message">{{ message }}</p>
      <button class="cart-error__retry" (click)="retry.emit()">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 1 1 1 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M2 12V8h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Try again
      </button>
    </div>
