<!-- ═══════════════════════════════════════════════════════
     TALENTREE · Invoice Download Button
     ═══════════════════════════════════════════════════════ -->

<button
  class="co-invoice-btn"
  [disabled]="svc.invoiceDownloading()"
  (click)="download()"
  type="button"
>
  @if (svc.invoiceDownloading()) {
    <span class="co-spinner"></span>
    <span>Preparing…</span>
  } @else {
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-5-5m5 5l5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 17v3a2 2 0 002 2h12a2 2 0 002-2v-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    <span>Download Invoice</span>
  }
</button>

@if (failed()) {
  <span class="co-invoice-error">Couldn't download invoice. Try again.</span>
}
