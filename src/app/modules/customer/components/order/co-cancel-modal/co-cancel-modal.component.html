<!-- ═══════════════════════════════════════════════════════
     TALENTREE · Cancel Order Modal
     ═══════════════════════════════════════════════════════ -->

<div class="co-modal-overlay" (click)="close()">
  <div class="co-modal" (click)="$event.stopPropagation()">

    @if (phase() !== 'success') {
      <button class="co-modal-close" (click)="close()" [disabled]="phase() === 'loading'" aria-label="Close">
        <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    }

    @if (phase() === 'success') {
      <div class="co-modal-state co-modal-state--success">
        <div class="co-success-icon">
          <svg viewBox="0 0 60 60" fill="none">
            <circle cx="30" cy="30" r="28" stroke="#27A06B" stroke-width="2"/>
            <path d="M19 31l8 8 16-18" stroke="#27A06B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h3>Order Cancelled</h3>
        <p>Order {{ orderNumber }} has been cancelled.</p>
      </div>
    } @else {
      <div class="co-warning-icon">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="22" stroke="#B8860B" stroke-width="2"/><path d="M24 14v14M24 33h.1" stroke="#B8860B" stroke-width="2.5" stroke-linecap="round"/></svg>
      </div>

      <h3 class="co-modal-title">Cancel This Order?</h3>
      <p class="co-modal-desc">
        Are you sure you want to cancel order <strong>{{ orderNumber }}</strong>? This action cannot be undone.
      </p>

      @if (svc.cancelError()) {
        <div class="co-form-error">{{ svc.cancelError() }}</div>
      }

      <div class="co-modal-actions">
        <button
          class="btn-danger-modal"
          [disabled]="phase() === 'loading'"
          (click)="confirmCancel()"
        >
          @if (phase() === 'loading') {
            <span class="co-spinner"></span>
            <span>Cancelling…</span>
          } @else {
            <span>Yes, Cancel Order</span>
          }
        </button>
        <button class="btn-ghost-modal" [disabled]="phase() === 'loading'" (click)="close()">
          Keep Order
        </button>
      </div>
    }
  </div>
</div>
