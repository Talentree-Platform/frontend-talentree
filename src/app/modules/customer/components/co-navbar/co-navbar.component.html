<header class="navbar-shell">
  <nav class="navbar" [class.navbar--scrolled]="isScrolled()" aria-label="Primary">
    <span class="navbar__glass-sheen" aria-hidden="true"></span>

    <!-- LEFT: Logo -->
    <a
      class="navbar__logo"
      routerLink="/customer/customerhome"
      aria-label="Talentree — go to home"
    >
      <span class="navbar__logo-glow" aria-hidden="true"></span>
      <svg class="navbar__logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20 36V22" stroke="url(#navLogoTrunk)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M20 22C20 22 10 20 9 12C9 12 16 10 20 17C20 17 22 8 30 8C30 8 31 17 20 22Z" fill="url(#navLogoLeaf)"/>
        <circle cx="20" cy="10" r="3" fill="#ffd875"/>
        <defs>
          <linearGradient id="navLogoTrunk" x1="20" y1="22" x2="20" y2="36" gradientUnits="userSpaceOnUse">
            <stop stop-color="var(--nav-gold-bright)"/>
            <stop offset="1" stop-color="var(--nav-gold)"/>
          </linearGradient>
          <linearGradient id="navLogoLeaf" x1="9" y1="8" x2="30" y2="22" gradientUnits="userSpaceOnUse">
            <stop stop-color="#ffd875"/>
            <stop offset="1" stop-color="var(--nav-gold-bright)"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="navbar__logo-word">Talentree</span>
    </a>

    <!-- CENTER: Desktop links -->
    <ul class="navbar__links" role="menubar">
      <li *ngFor="let link of navLinks" role="none" class="navbar__link-item">
        <a
          role="menuitem"
          class="navbar__link"
          [routerLink]="link.path"
          routerLinkActive="navbar__link--active"
          #rla="routerLinkActive"
        >
          <span class="navbar__link-dot" [class.is-visible]="rla.isActive" aria-hidden="true"></span>
          <span class="navbar__link-label">{{ link.label }}</span>
          <span class="navbar__link-underline" [class.is-visible]="rla.isActive" aria-hidden="true"></span>
        </a>
      </li>
    </ul>

    <!-- RIGHT: Actions -->
    <div class="navbar__actions">
      <a
        class="navbar__icon-btn"
        routerLink="/customer/wishlist"
        routerLinkActive="navbar__icon-btn--active"
        aria-label="Wishlist"
      >
        <svg class="navbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
          <path
            d="M12 20.3s-7.4-4.5-9.9-9.1C.6 7.9 2.4 4.7 5.7 4.2c2-.3 3.9.6 4.9 2.1 1-1.5 2.9-2.4 4.9-2.1 3.3.5 5.1 3.7 3.6 7-2.5 4.6-9.9 9.1-9.9 9.1z"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span class="navbar__badge" *ngIf="hasWishlistBadge()">{{ wishlistCount() }}</span>
      </a>

      <a
        class="navbar__icon-btn"
        routerLink="/customer/cart"
        routerLinkActive="navbar__icon-btn--active"
        aria-label="Cart"
      >
        <svg class="navbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
          <circle cx="9" cy="21" r="1.3" />
          <circle cx="18" cy="21" r="1.3" />
          <path
            d="M2.4 3h2.3l2.1 11.2a2 2 0 0 0 2 1.6h8.1a2 2 0 0 0 2-1.6L20.8 7.4H6.1"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span class="navbar__badge" *ngIf="hasCartBadge()">{{ cartCount() }}</span>
      </a>

      <span class="navbar__divider" aria-hidden="true"></span>

      <button
        type="button"
        class="navbar__logout-btn"
        (click)="onLogout()"
      >
        <svg class="navbar__icon navbar__icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M16 17l5-5-5-5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M21 12H9" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="navbar__logout-label">Log out</span>
      </button>

      <button
        type="button"
        class="navbar__hamburger"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="isMobileMenuOpen()"
        aria-controls="mobile-drawer"
        aria-label="Open menu"
      >
        <span class="navbar__hamburger-line" [class.is-open]="isMobileMenuOpen()"></span>
        <span class="navbar__hamburger-line" [class.is-open]="isMobileMenuOpen()"></span>
        <span class="navbar__hamburger-line" [class.is-open]="isMobileMenuOpen()"></span>
      </button>
    </div>

    <span class="navbar__scroll-progress" [style.width.%]="scrollProgress()" aria-hidden="true"></span>
  </nav>
</header>

<!-- MOBILE DRAWER -->
<div
  class="drawer-backdrop"
  [class.is-open]="isMobileMenuOpen()"
  (click)="closeMobileMenu()"
></div>

<aside
  id="mobile-drawer"
  class="drawer"
  [class.is-open]="isMobileMenuOpen()"
  [attr.aria-hidden]="!isMobileMenuOpen()"
>
  <div class="drawer__header">
    <span class="drawer__title">Menu</span>
    <button type="button" class="drawer__close" (click)="closeMobileMenu()" aria-label="Close menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round" />
      </svg>
    </button>
  </div>

  <nav class="drawer__links" aria-label="Mobile">
    <a
      *ngFor="let link of navLinks"
      class="drawer__link"
      [routerLink]="link.path"
      routerLinkActive="drawer__link--active"
      (click)="closeMobileMenu()"
    >
      {{ link.label }}
    </a>
  </nav>

  <div class="drawer__footer">
    <button type="button" class="drawer__logout" (click)="onLogout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M16 17l5-5-5-5" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M21 12H9" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span>Log out</span>
    </button>
  </div>
</aside>
