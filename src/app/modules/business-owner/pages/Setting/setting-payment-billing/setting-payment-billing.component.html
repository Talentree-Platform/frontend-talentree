<div class="page">
  <header class="page-header m-auto">
    <h2 class="text-center text-gold">Bank Account Settings</h2>
    <p class="text-center">
      Manage your bank account details for receiving payments securely.
    </p>
  </header>

  <!-- 🔐 Password Section -->
  <section class="section pb-3">
    <div class="card">
      <h5 class="text-burgandy">Security Verification</h5>
      <p class="hint">Enter your password to view or update your bank details.</p>

      <div class="form-grid">
        <label class="field full">
          <span>Current Password</span>
          <input
            class="input-main"
            type="password"
            [(ngModel)]="password"
            placeholder="Enter your password"
          />
        </label>
      </div>

      <div class="actions-row">
        <button class="btn-main btn-gold" (click)="loadPaymentInfo()">
          Load Bank Info
        </button>
      </div>
    </div>
  </section>

  <!-- 🏦 Bank Details -->
  <section class="section">
    <div class="card">
      <h5 class="text-burgandy">Bank Account Details</h5>

      <form class="form-grid" [formGroup]="paymentForm" (ngSubmit)="submit()">

        <!-- Bank Name -->
        <label class="field full">
          <span>Bank Name</span>
          <input class="input-main" type="text" formControlName="bankName" />
          @if(paymentForm.get('bankName')?.touched && paymentForm.get('bankName')?.hasError('required')){
            <small class="error text-danger">
            Bank name is required
          </small>
          }
          
        </label>

        <!-- Account Holder Name -->
        <label class="field full">
          <span>Account Holder Name</span>
          <input class="input-main" type="text" formControlName="accountHolderName" />
          @if(paymentForm.get('accountHolderName')?.touched && paymentForm.get('accountHolderName')?.hasError('required')){
            <small class="error text-danger">
            Account holder name is required
          </small>
          }
          
        </label>

        <!-- Account Number -->
        <label class="field full">
          <span>Account Number</span>
          <input class="input-main" type="text" formControlName="accountNumber" />
          @if(paymentForm.get('accountNumber')?.touched && paymentForm.get('accountNumber')?.hasError('required')){
            <small class="error text-danger">
            Account number is required
          </small>
          }
          
        </label>

        <!-- SWIFT Code -->
        <label class="field full">
          <span>SWIFT / Routing Code</span>
          <input class="input-main" type="text" formControlName="routingSwiftCode" />
          @if(paymentForm.get('routingSwiftCode')?.touched && paymentForm.get('routingSwiftCode')?.hasError('required')){
            <small class="error text-danger">
            SWIFT code is required
          </small>
          }
          
        </label>

        <!-- 👁️ Masked Account (read only) -->
        <label class="field full">
          <span>Saved Account (Masked)</span>
          <input
            class="input-main"
            type="text"
            [value]="maskedAccountNumber"
            disabled
          />
        </label>

        <!-- Submit -->
        <div class="actions-row">
          <button type="submit" class="btn-main btn-burgandy w-25">
            Save Changes
          </button>
        </div>

      </form>
    </div>
  </section>
</div>
