<div class="settings-root">

  <!-- ═══════════════════════════════ HERO ═══════════════════════════════ -->
  <section class="hero">
    <!-- decorative blobs -->
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>

    <div class="hero-copy">
      <span class="hero-badge">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <circle cx="6" cy="6" r="5" stroke="#C9A84C" stroke-width="1.5"/>
          <circle cx="6" cy="6" r="2" fill="#C9A84C"/>
        </svg>
        Account Settings
      </span>
      <h1 class="hero-title">Your Profile,<br><em>Your Identity</em></h1>
      <p class="hero-sub">Update personal information, manage security preferences, and keep your workspace in sync.</p>
    </div>

    <div class="hero-visual">
      <div class="hero-img-frame hero-img-frame--illustration" aria-hidden="true">
        <svg class="hero-illustration-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
          <!-- Soft glow -->
          <circle cx="120" cy="120" r="98" fill="rgba(201,168,76,0.08)"/>

          <!-- Rotating gear (security / preferences) -->
          <g class="hero-illus-gear">
            <path d="M176 52 L180 52 L182 60 L189 63 L196 58 L200 62 L195 69 L198 76 L206 78 L206 82 L198 84 L195 91 L200 98 L196 102 L189 97 L182 100 L180 108 L176 108 L174 100 L167 97 L160 102 L156 98 L161 91 L158 84 L150 82 L150 78 L158 76 L161 69 L156 62 L160 58 L167 63 L174 60 Z"
              fill="rgba(201,168,76,0.16)" stroke="rgba(201,168,76,0.4)" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="178" cy="80" r="10" fill="rgba(20,14,8,0.12)" stroke="rgba(201,168,76,0.45)" stroke-width="1.5"/>
          </g>

          <!-- Profile card (account) -->
          <rect x="34" y="96" width="118" height="92" rx="14" fill="rgba(201,168,76,0.14)" stroke="rgba(201,168,76,0.35)" stroke-width="1.5"/>
          <circle cx="66" cy="130" r="16" fill="rgba(99,102,241,0.16)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
          <rect x="90" y="121" width="48" height="6" rx="3" fill="rgba(201,168,76,0.32)"/>
          <rect x="90" y="133" width="34" height="5" rx="2.5" fill="rgba(201,168,76,0.2)"/>
          <rect x="50" y="156" width="86" height="6" rx="3" fill="rgba(201,168,76,0.14)"/>
          <rect x="50" y="168" width="60" height="6" rx="3" fill="rgba(201,168,76,0.14)"/>

          <!-- Toggle switch (preferences) -->
          <rect x="140" y="150" width="46" height="24" rx="12" fill="rgba(201,168,76,0.22)" stroke="rgba(201,168,76,0.45)" stroke-width="1.5"/>
          <circle class="hero-illus-toggle" cx="174" cy="162" r="8" fill="rgba(201,168,76,0.85)"/>

          <!-- Shield (security) -->
          <path d="M182 118 L200 124 V138 C200 150 192 158 182 162 C172 158 164 150 164 138 V124 Z"
            fill="rgba(99,102,241,0.14)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M174 138 L180 144 L191 130" fill="none" stroke="rgba(99,102,241,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

          <!-- Sparkles -->
          <circle class="hero-illus-sparkle hero-illus-sparkle--1" cx="44" cy="70" r="3" fill="rgba(201,168,76,0.6)"/>
          <circle class="hero-illus-sparkle hero-illus-sparkle--2" cx="206" cy="182" r="2.5" fill="rgba(99,102,241,0.55)"/>
          <circle class="hero-illus-sparkle hero-illus-sparkle--3" cx="120" cy="60" r="2" fill="rgba(201,168,76,0.5)"/>
        </svg>
      </div>
    </div>
  </section>


  <!-- ═══════════════════════════════ PROFILE CARD ═══════════════════════ -->
  <section class="profile-card">

    <!-- Card header -->
    <div class="card-header">
      <div class="card-header-text">
        <h2 class="card-title">Profile Information</h2>
        <p class="card-sub">Keep your personal details accurate and up to date.</p>
      </div>
      <div class="card-header-line"></div>
    </div>

    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar-wrap">
        <img
          class="avatar-img"
          [src]="profilePreview || defaultAvatar"
          (error)="onAvatarError($event)"
          alt="Profile avatar"
        />
        <button type="button" class="avatar-edit-btn" (click)="fileInput.click()" title="Change photo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>

      <input type="file" (change)="onProfilePhotoChange($event)" hidden #fileInput>

      <div class="avatar-meta">
        <span class="avatar-name-hint">Profile Photo</span>
        <button type="button" class="upload-chip" (click)="fileInput.click()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
          Upload new photo
        </button>
        <span class="upload-hint">JPG, PNG or WEBP · max 5 MB</span>
      </div>
    </div>

    <!-- Form -->
    <form class="pf-form" [formGroup]="profileForm" (ngSubmit)="submit()">

      <div class="form-row">
        <!-- First Name -->
        <div class="field-wrap">
          <div class="input-shell" [class.focused]="firstNameFocus" [class.filled]="profileForm.get('firstName')?.value">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              class="pf-input"
              type="text"
              formControlName="firstName"
              id="firstName"
              placeholder=" "
              (focus)="firstNameFocus=true"
              (blur)="firstNameFocus=false"
            />
            <label class="float-label" for="firstName">First Name</label>
          </div>
        </div>

        <!-- Last Name -->
        <div class="field-wrap">
          <div class="input-shell" [class.focused]="lastNameFocus" [class.filled]="profileForm.get('lastName')?.value">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              class="pf-input"
              type="text"
              formControlName="lastName"
              id="lastName"
              placeholder=" "
              (focus)="lastNameFocus=true"
              (blur)="lastNameFocus=false"
            />
            <label class="float-label" for="lastName">Last Name</label>
          </div>
        </div>
      </div>

      <div class="form-row">
        <!-- Email -->
        <div class="field-wrap">
          <div class="input-shell" [class.focused]="emailFocus" [class.filled]="profileForm.get('email')?.value" [class.error]="profileForm.get('email')?.invalid && profileForm.get('email')?.touched">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input
              class="pf-input"
              type="email"
              formControlName="email"
              id="email"
              placeholder=" "
              (focus)="emailFocus=true"
              (blur)="emailFocus=false"
            />
            <label class="float-label" for="email">Email Address</label>
          </div>
          <span class="field-error" *ngIf="profileForm.get('email')?.invalid && profileForm.get('email')?.touched">
            Please enter a valid email address.
          </span>
        </div>

        <!-- Phone -->
        <div class="field-wrap">
          <div class="input-shell" [class.focused]="phoneFocus" [class.filled]="profileForm.get('phoneNumber')?.value">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 5.66 5.66l.97-.97a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </span>
            <input
              class="pf-input"
              type="tel"
              formControlName="phoneNumber"
              id="phoneNumber"
              placeholder=" "
              (focus)="phoneFocus=true"
              (blur)="phoneFocus=false"
            />
            <label class="float-label" for="phoneNumber">Phone Number</label>
          </div>
        </div>
      </div>

      <!-- CTA row -->
      <div class="form-actions">
        <button type="submit" class="save-btn" [class.loading]="isLoading" [disabled]="isLoading">
          <span class="save-btn-inner">
            <svg *ngIf="!isLoading" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/>
              <polyline points="7 3 7 8 15 8"/>
            </svg>
            <span class="btn-spinner" *ngIf="isLoading"></span>
            {{ isLoading ? 'Saving…' : 'Save Changes' }}
          </span>
        </button>
      </div>

    </form>
  </section>

</div>
