
<div class="home-page">

  <!-- Quick Access -->
  <div class="widget quick-links-widget">
    <div class="widget-header">
      <h3>Quick Access</h3>
    </div>
    <div class="quick-links-grid">
      <a class="quick-link-card" *ngFor="let link of quickLinks" [routerLink]="link.route">
        <span class="quick-link-icon"><i class="fa-solid" [ngClass]="link.icon"></i></span>
        <span class="quick-link-label">{{ link.label }}</span>
        <span class="quick-link-desc">{{ link.description }}</span>
      </a>
    </div>
  </div>

  <!-- Financial Summary -->
  <div class="widget" *ngIf="!loading && summary">
    <div class="widget-header">
      <h3>Financial Summary</h3>
      <button (click)="goToFinancial()">View All →</button>
    </div>
    <div class="widget-cards">
      <div class="card green">
        <span class="label">Revenue</span>
        <span class="value">{{ summary.totalRevenue | currency }}</span>
      </div>
      <div class="card red">
        <span class="label">Expenses</span>
        <span class="value">{{ summary.totalExpenses | currency }}</span>
      </div>
      <div class="card blue">
        <span class="label">Balance</span>
        <span class="value">{{ summary.availableBalance | currency }}</span>
      </div>
    </div>
  </div>
  <div class="loading" *ngIf="loading">Loading...</div>

  <!-- KB Recommendations -->
  <app-kb-recommendations></app-kb-recommendations>

</div>
