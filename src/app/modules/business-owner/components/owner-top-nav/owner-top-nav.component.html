<!-- TOP NAVBAR -->
<nav class="navbar navbar-expand-lg main-navbar fixed-top">
  
  <div class="container">



    <!-- Logo -->
    <a class="navbar-brand tt-logo" href="#" aria-label="Talentree">
      <svg class="tt-logo-icon" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M17 31V19" stroke="url(#tt-logo-gold)" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M17 23L10.5 17.5M17 20.5L24 15M17 18.5V12" stroke="url(#tt-logo-gold)" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="17" cy="10" r="4.2" fill="url(#tt-logo-gold)"/>
        <circle cx="8.5" cy="15.5" r="3.1" fill="url(#tt-logo-gold)" opacity="0.85"/>
        <circle cx="25.5" cy="13.5" r="3.1" fill="url(#tt-logo-gold)" opacity="0.85"/>
        <circle cx="10.5" cy="8.3" r="2.1" fill="url(#tt-logo-gold)" opacity="0.65"/>
        <circle cx="24" cy="6.8" r="2.1" fill="url(#tt-logo-gold)" opacity="0.65"/>
        <defs>
          <linearGradient id="tt-logo-gold" x1="4" y1="4" x2="30" y2="31" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#F0D080"/>
            <stop offset="1" stop-color="#B8860B"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="tt-logo-text">Talentree</span>
    </a>

    <!-- Toggle Btn -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- COLLAPSE CONTENT (MOBILE ONLY) -->
    <div class="collapse navbar-collapse" id="mainNav">

      <!-- Search Bar -->
      <div class="search-container mx-auto my-3 my-lg-0"> <svg class="search-icon" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg> <input type="text" class="search-input" placeholder="Search ..."> </div>
      <!-- Icons -->
      <div class="nav-icons d-flex align-items-center gap-3 ms-lg-auto">
        <!-- cart -->
        <button class="icon-btn" routerLink="/businessowner/rawmaterialcart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg> <span class="badge">{{cartCount}}</span> </button>
          <button class="icon-btn" routerLink="notifications"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg> </button>
          <button class="icon-btn theme-toggle-btn" (click)="toggleTheme()" [attr.aria-label]="themeSvc.isLight ? 'Switch to Dark Mode' : 'Switch to Light Mode'">
            <i class="fa-solid" [class.fa-moon]="!themeSvc.isLight" [class.fa-sun]="themeSvc.isLight"></i>
          </button>
          <div class="profile-menu">
            <button class="icon-btn profile-btn" (click)="toggleProfileMenu()" [class.active]="isProfileMenuOpen">
              <img class="profile-pic" [src]="profileImageUrl || defaultAvatar" (error)="onAvatarError($event)" alt="">
            </button>
            @if (isProfileMenuOpen) {
              <div class="profile-dropdown">
                <div class="profile-dropdown-header">
                  <img class="profile-dropdown-pic" [src]="profileImageUrl || defaultAvatar" (error)="onAvatarError($event)" alt="">
                  <div class="profile-dropdown-info">
                    <span class="profile-dropdown-name">{{ userName || 'Business Owner' }}</span>
                    @if (userEmail) {
                      <span class="profile-dropdown-email">{{ userEmail }}</span>
                    }
                  </div>
                </div>
                <div class="profile-dropdown-divider"></div>
                <button class="profile-dropdown-item" (click)="logout()">
                  <i class="fa-solid fa-right-from-bracket"></i>
                  <span>Logout</span>
                </button>
              </div>
            }
          </div>
      </div>
      <!-- SECONDARY NAV (MOBILE VERSION ONLY) -->
      <div class="d-lg-none mt-3">
        <button class="nav-tab active">Dashboard</button>
        <button class="nav-tab" routerLink="/businessowner/ownerProduct" routerLinkActive="active" >My Products</button>
        <button class="nav-tab">Orders</button>
        <button class="nav-tab" routerLink="/businessowner/rawmaterialhome" routerLinkActive="active">Raw Materials</button>
        <button class="nav-tab">Support</button>
        <button class="nav-tab">Smart Tools</button>
      </div>

    </div>
  </div>
</nav>
