<!-- TOP NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white main-navbar fixed-top">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand" href="#">
      <img class="logo" src="assets/images/logo.jpg" alt="">
    </a>

    <!-- Toggle Btn -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- COLLAPSE CONTENT -->
    <div class="collapse navbar-collapse" id="mainNav">

      <!-- Search Bar -->
      <div class="search-container mx-auto my-3 my-lg-0">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" class="search-input" placeholder="Search ...">
      </div>

      <!-- Icons -->
      <div class="nav-icons d-flex align-items-center gap-3 ms-lg-auto">

        <!-- Cart -->
        <button class="icon-btn" routerLink="/businessowner/rawmaterialcart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="badge">{{cartCount}}</span>
        </button>

        <!-- Wishlist -->
        <button class="icon-btn" routerLink="wishlist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
        </button>

        <!-- Notifications -->
        <button class="icon-btn" routerLink="notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
        </button>

        <!-- Profile Dropdown -->
        <div class="profile-wrapper" (click)="toggleDropdown()">
          <button class="icon-btn profile-btn">
            <img class="profile-pic" src="./assets/images/olive.jpg" alt="">
          </button>

          <!-- Dropdown -->
          <div class="profile-dropdown" *ngIf="dropdownOpen" (click)="$event.stopPropagation()">
            <div class="dropdown-header">
              <img class="profile-pic sm" src="./assets/images/olive.jpg" alt="">
              <div>
                <p class="dropdown-name">Business Owner</p>
                <p class="dropdown-role">Seller</p>
              </div>
            </div>

            <div class="dropdown-divider"></div>

            <a class="dropdown-item" (click)="navigateTo('/businessowner/account')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              </svg>
              Account Settings
            </a>

            <a class="dropdown-item" (click)="navigateTo('/businessowner/profile')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              My Profile
            </a>

            <div class="dropdown-divider"></div>

            <button class="dropdown-item danger" (click)="logout()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
              </svg>
              Logout
            </button>
          </div>
        </div>

      </div>

      <!-- MOBILE TABS -->
      <div class="d-lg-none mt-3">
        <button class="nav-tab active">Dashboard</button>
        <button class="nav-tab" routerLink="/businessowner/ownerProduct" routerLinkActive="active">My Products</button>
        <button class="nav-tab">Orders</button>
        <button class="nav-tab" routerLink="/businessowner/rawmaterialhome" routerLinkActive="active">Raw
          Materials</button>
        <button class="nav-tab">Support</button>
        <button class="nav-tab">Smart Tools</button>
        <button class="nav-tab" routerLink="/account" routerLinkActive="active">Account</button>
      </div>

    </div>

    <!-- Overlay -->
    <div class="dropdown-overlay" *ngIf="dropdownOpen" (click)="dropdownOpen = false"></div>

  </div>
</nav>
